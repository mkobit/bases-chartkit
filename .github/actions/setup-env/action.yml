name: 'Setup Bun and Install'
description: 'Sets up Bun and installs dependencies'
inputs:
  bun-version:
    description: 'Bun version'
    required: false
    default: "1.3.12"
runs:
  using: "composite"
  steps:
    - name: Install Bun with mise
      uses: jdx/mise-action@v4
      with:
        version: "2026.5.1"
        cache: true
    - name: Install dependencies
      run: bun install
      shell: bash
